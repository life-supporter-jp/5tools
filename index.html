<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ライフサポート ポータル</title>
    <style>
        :root {
            --primary-bg: #f0f4f8;
            --card-bg: #ffffff;
            --accent-color: #4a90e2;
            --text-main: #333;
            --text-sub: #666;
        }
        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: var(--primary-bg);
            margin: 0;
            padding: 20px 15px;
            color: var(--text-main);
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            font-size: 1.5rem;
            color: var(--accent-color);
            margin-bottom: 25px;
        }
        .menu-link {
            display: block;
            text-decoration: none;
            color: inherit;
            background: var(--card-bg);
            margin-bottom: 15px;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.2s, box-shadow 0.2s;
            border-left: 6px solid var(--accent-color);
        }
        .menu-link:active {
            transform: scale(0.98);
            box-shadow: 0 2px 3px rgba(0,0,0,0.1);
        }
        .title-row {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }
        .number {
            background: var(--accent-color);
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 12px;
            flex-shrink: 0;
        }
        .title-text {
            font-size: 1.1rem;
            font-weight: bold;
        }
        .description {
            font-size: 0.9rem;
            line-height: 1.5;
            color: var(--text-sub);
            padding-left: 40px;
        }
        .category-tags {
            margin-top: 10px;
            padding-left: 40px;
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }
        .tag {
            font-size: 0.75rem;
            background: #e1e8ed;
            padding: 2px 8px;
            border-radius: 4px;
            color: #555;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>ライフサポート ツール集</h1>

    <!-- 1) 150からのヒント -->
    <a href="https://life-supporter-jp.github.io/kiso150/" class="menu-link">
        <div class="title-row">
            <div class="number">1</div>
            <div class="title-text">これからが不安という人に150からのヒント</div>
        </div>
        <div class="description">検索機能付き。相続、医療、介護、保健、葬儀、お墓について簡単に調べられます。</div>
    </a>

    <!-- 2) 体操とゲーム -->
    <a href="https://life-supporter-jp.github.io/taisou/" class="menu-link">
        <div class="title-row">
            <div class="number">2</div>
            <div class="title-text">簡単な体操とゲームで毎日リフレッシュ</div>
        </div>
        <div class="description">AIが体操指示を出します。一人でも大勢でも、時間設定して運動できます。</div>
    </a>

    <!-- 3) マイライフチェック60 -->
    <a href="https://life-supporter-jp.github.io/life-check/" class="menu-link">
        <div class="title-row">
            <div class="number">3</div>
            <div class="title-text">マイライフチェック60項目とメモ帳</div>
        </div>
        <div class="description">全6章（お金、介護、医療、心、葬儀、デジタル遺産）。各項目に解説文付き。</div>
        <div class="category-tags">
            <span class="tag">財産管理</span><span class="tag">健康</span><span class="tag">供養</span><span class="tag">デジタル遺産</span>
        </div>
    </a>

    <!-- 4) 運勢鑑定 -->
    <a href="https://life-supporter-jp.github.io/unsei/" class="menu-link">
        <div class="title-row">
            <div class="number">4</div>
            <div class="title-text">運勢鑑定</div>
        </div>
        <div class="description">毎日1回、3つの扉から今日の運勢を占います。</div>
    </a>

    <!-- 5) ひらがな並び替えゲーム -->
    <a href="https://life-supporter-jp.github.io/narabikae/" class="menu-link">
        <div class="title-row">
            <div class="number">5</div>
            <div class="title-text">ひらがな並び替えゲーム</div>
        </div>
        <div class="description">脳トレに最適。時間制限がないので、ゆっくり自分のペースで遊べます。</div>
    </a>

</div>

</body>
</html>
